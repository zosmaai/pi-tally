name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (keeps PR-update churn cheap).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Use `npm install` rather than `npm ci` — peerDependencies are intentionally
      # loose (`*`) for the pi extension contract, so a strict lockfile match
      # would fight us. The lockfile is still committed for reproducibility.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
